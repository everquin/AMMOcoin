name: Build Release Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: depends-linux-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-linux-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config libssl-dev libevent-dev bsdmainutils python3 cmake \
            libboost-all-dev libdb5.3++-dev libzmq3-dev libsodium-dev \
            libgmp-dev curl

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-linux-gnu -j$(nproc) NO_QT=1

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure --prefix=$PWD/depends/x86_64-linux-gnu \
            --disable-tests --disable-bench --enable-wallet \
            --without-gui --without-miniupnpc

      - name: Build
        run: make -j$(nproc)

      - name: Strip binaries
        run: |
          strip src/ammocoind src/ammocoin-cli src/ammocoin-tx

      - name: Package Linux x86_64
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p pkg/AMMOcoin-${VERSION}-Linux-x86_64
          cp src/ammocoind src/ammocoin-cli src/ammocoin-tx pkg/AMMOcoin-${VERSION}-Linux-x86_64/
          cd pkg
          tar czf AMMOcoin-${VERSION}-Linux-x86_64.tar.gz AMMOcoin-${VERSION}-Linux-x86_64/
          zip -r AMMOcoin-${VERSION}-Linux-x86_64.zip AMMOcoin-${VERSION}-Linux-x86_64/

      - name: Package Linux .deb
        run: |
          VERSION=${{ github.event.inputs.version }}
          VER_NUM=$(echo $VERSION | sed 's/^v//')
          DEB_DIR=ammocoin_${VER_NUM}_amd64
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/local/bin
          cp src/ammocoind src/ammocoin-cli src/ammocoin-tx ${DEB_DIR}/usr/local/bin/
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ammocoin
          Version: ${VER_NUM}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: AMMOcoin Developers <dev@ammocoin.org>
          Description: AMMOcoin Core daemon and CLI tools
           AMMOcoin is a privacy-focused cryptocurrency.
           This package contains ammocoind, ammocoin-cli, and ammocoin-tx.
          EOF
          sed -i 's/^          //' ${DEB_DIR}/DEBIAN/control
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb AMMOcoin-${VERSION}-Linux-amd64.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            pkg/AMMOcoin-*-Linux-x86_64.tar.gz
            pkg/AMMOcoin-*-Linux-x86_64.zip
            AMMOcoin-*-Linux-amd64.deb

  build-windows:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: depends-win64-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-win64-

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git cmake python3 \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev mingw-w64-tools nsis
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc) NO_QT=1

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure --prefix=$PWD/depends/x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-tests --disable-bench --enable-wallet \
            --without-gui --without-miniupnpc

      - name: Build
        run: make -j$(nproc)

      - name: Strip binaries
        run: |
          x86_64-w64-mingw32-strip src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe

      - name: Package Windows x86_64
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p pkg/AMMOcoin-${VERSION}-Windows-x86_64
          cp src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe pkg/AMMOcoin-${VERSION}-Windows-x86_64/
          cd pkg
          tar czf AMMOcoin-${VERSION}-Windows-x86_64.tar.gz AMMOcoin-${VERSION}-Windows-x86_64/
          zip -r AMMOcoin-${VERSION}-Windows-x86_64.zip AMMOcoin-${VERSION}-Windows-x86_64/

      - name: Create Windows installer
        run: |
          VERSION=${{ github.event.inputs.version }}
          cat > installer.nsi << 'NSIEOF'
          !include "MUI2.nsh"
          Name "AMMOcoin Core"
          OutFile "AMMOcoin-${VERSION}-Windows-x86_64-Setup.exe"
          InstallDir "$PROGRAMFILES64\AMMOcoin"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath $INSTDIR
            File src\ammocoind.exe
            File src\ammocoin-cli.exe
            File src\ammocoin-tx.exe
            CreateShortCut "$DESKTOP\AMMOcoin Daemon.lnk" "$INSTDIR\ammocoind.exe"
            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd
          Section "Uninstall"
            Delete "$INSTDIR\*.*"
            Delete "$DESKTOP\AMMOcoin Daemon.lnk"
            RMDir "$INSTDIR"
          SectionEnd
          NSIEOF
          sed -i "s/\${VERSION}/$VERSION/g" installer.nsi
          makensis installer.nsi 2>&1 || echo "NSIS installer creation skipped"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            pkg/AMMOcoin-*-Windows-x86_64.tar.gz
            pkg/AMMOcoin-*-Windows-x86_64.zip
            AMMOcoin-*-Windows-x86_64-Setup.exe

  build-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: depends-arm64-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-arm64-

      - name: Install ARM64 cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git cmake python3 \
            g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build depends
        run: |
          cd depends
          make HOST=aarch64-linux-gnu -j$(nproc) NO_QT=1

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure --prefix=$PWD/depends/aarch64-linux-gnu \
            --host=aarch64-linux-gnu \
            --disable-tests --disable-bench --enable-wallet \
            --without-gui --without-miniupnpc

      - name: Build
        run: make -j$(nproc)

      - name: Strip binaries
        run: |
          aarch64-linux-gnu-strip src/ammocoind src/ammocoin-cli src/ammocoin-tx

      - name: Package ARM64
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p pkg/AMMOcoin-${VERSION}-Linux-ARM64
          cp src/ammocoind src/ammocoin-cli src/ammocoin-tx pkg/AMMOcoin-${VERSION}-Linux-ARM64/
          cd pkg
          tar czf AMMOcoin-${VERSION}-Linux-ARM64.tar.gz AMMOcoin-${VERSION}-Linux-ARM64/
          zip -r AMMOcoin-${VERSION}-Linux-ARM64.zip AMMOcoin-${VERSION}-Linux-ARM64/

      - name: Package ARM64 .deb
        run: |
          VERSION=${{ github.event.inputs.version }}
          VER_NUM=$(echo $VERSION | sed 's/^v//')
          DEB_DIR=ammocoin_${VER_NUM}_arm64
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/local/bin
          cp src/ammocoind src/ammocoin-cli src/ammocoin-tx ${DEB_DIR}/usr/local/bin/
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ammocoin
          Version: ${VER_NUM}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: AMMOcoin Developers <dev@ammocoin.org>
          Description: AMMOcoin Core daemon and CLI tools
           AMMOcoin is a privacy-focused cryptocurrency.
           This package contains ammocoind, ammocoin-cli, and ammocoin-tx.
          EOF
          sed -i 's/^          //' ${DEB_DIR}/DEBIAN/control
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb AMMOcoin-${VERSION}-Linux-arm64.deb

      - name: Upload ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            pkg/AMMOcoin-*-Linux-ARM64.tar.gz
            pkg/AMMOcoin-*-Linux-ARM64.zip
            AMMOcoin-*-Linux-arm64.deb

  upload-release:
    needs: [build-linux, build-windows, build-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-files

      - name: List all files
        run: find release-files -type f | sort

      - name: Generate checksums
        run: |
          cd release-files
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.exe" \) -exec shasum -a 256 {} \; | sed 's|  \./|  |' > checksums.txt
          cat checksums.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          cd release-files
          for file in $(find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.exe" \)); do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            gh release delete-asset ${VERSION} "$filename" --repo ${{ github.repository }} --yes 2>/dev/null || true
            gh release upload ${VERSION} "$file" --repo ${{ github.repository }} --clobber
          done
