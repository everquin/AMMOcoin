name: Build AMMOcoin v1.1.0 Linux x86_64

on:
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    name: Build Linux x86_64 Static Binaries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            git \
            curl \
            wget \
            python3 \
            bsdmainutils \
            cmake

      - name: Install Rust for librustzcash
        run: |
          echo "🦀 Installing Rust 1.80+ and setting as default..."
          rustup toolchain install 1.80
          rustup default 1.80
          rustc --version
          cargo --version
          echo "✅ Rust 1.80 set as default"

      - name: Verify Genesis Block Hash
        run: |
          echo "🔍 Verifying v1.1.0 genesis block in source code..."
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if grep -q "$GENESIS_HASH" source/src/chainparams.cpp; then
            echo "✅ Correct genesis hash found: $GENESIS_HASH"
          else
            echo "❌ ERROR: Expected genesis hash not found!"
            exit 1
          fi

      - name: Verify Boost patch exists
        run: |
          echo "🔍 Verifying Boost patch file exists..."
          if [ -f source/depends/patches/boost/fix-pthread-stack-min.patch ]; then
            echo "✅ Boost patch file found"
            cat source/depends/patches/boost/fix-pthread-stack-min.patch
          else
            echo "❌ ERROR: Boost patch file missing!"
            exit 1
          fi

          echo "🔍 Checking boost.mk patch declaration..."
          if grep -q "fix-pthread-stack-min.patch" source/depends/packages/boost.mk; then
            echo "✅ Patch declared in boost.mk"
            grep "patches" source/depends/packages/boost.mk
          else
            echo "❌ ERROR: Patch not declared in boost.mk!"
            exit 1
          fi

      - name: Update timestamps on pre-generated files
        run: |
          echo "🔧 Updating timestamps on pre-generated autotools files..."
          find source -name "configure" -exec touch {} \;
          find source -name "Makefile.in" -exec touch {} \;
          find source -name "aclocal.m4" -exec touch {} \;
          echo "✅ Timestamps updated"

      - name: Build dependencies (Boost, BDB, libevent, etc.) - STATIC
        working-directory: source/depends
        run: |
          echo "🔨 Building dependencies for Linux with STATIC linking..."
          echo "Building on Ubuntu 22.04 with Boost patch for glibc 2.35+"
          echo "Building: Boost, OpenSSL, BerkeleyDB, libevent, ZMQ, GMP, libsodium"

          # Enable verbose output for debugging
          make -j$(nproc) HOST=x86_64-pc-linux-gnu V=1

          echo "✅ Dependencies built successfully"

      - name: Build AMMOcoin Linux Binaries
        working-directory: source
        run: |
          echo "🔨 Starting Linux build..."
          chmod +x configure
          chmod +x src/univalue/configure
          chmod +x src/secp256k1/configure
          chmod +x src/chiabls/configure

          echo "🔧 Configuring for Linux x86_64 with static dependencies..."
          CONFIG_SITE=$PWD/depends/x86_64-pc-linux-gnu/share/config.site \
          ./configure \
            --prefix=$PWD/dist \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-maintainer-mode \
            LDFLAGS="-static-libstdc++ -static-libgcc"

          echo "🔧 Touching Makefiles to prevent regeneration..."
          find . -name "Makefile" -exec touch {} \;
          find . -name "Makefile.in" -exec touch {} \;
          sleep 1
          touch src/univalue/Makefile src/secp256k1/Makefile src/Makefile

          echo "✅ Starting build..."
          make -j$(nproc)
          echo "✅ Build completed successfully"

          echo "📦 Installing binaries..."
          make install
          echo "✅ Installation complete"

      - name: Strip binaries
        working-directory: source
        run: |
          echo "✂️  Stripping debug symbols..."
          strip dist/bin/ammocoind
          strip dist/bin/ammocoin-cli
          strip dist/bin/ammocoin-tx
          echo "📊 Final binary sizes:"
          ls -lh dist/bin/

      - name: Verify static linking
        working-directory: source
        run: |
          echo "🔍 Verifying binary dependencies..."
          echo "=== ammocoind dependencies ==="
          ldd dist/bin/ammocoind
          echo ""

          # Check for Boost dynamic libraries (should NOT be present)
          if ldd dist/bin/ammocoind | grep -i "boost"; then
            echo "❌ ERROR: Binary still has dynamic Boost dependencies!"
            exit 1
          else
            echo "✅ No Boost dynamic dependencies - GOOD!"
          fi

          # Verify no "not found" dependencies
          if ldd dist/bin/ammocoind | grep "not found"; then
            echo "❌ ERROR: Binary has missing dependencies!"
            exit 1
          else
            echo "✅ All dependencies resolved - GOOD!"
          fi

          echo "🎉 Binary verification complete!"

      - name: Verify Compiled Binaries
        working-directory: source
        run: |
          echo "🔍 Verifying compiled binaries..."
          [ -f dist/bin/ammocoind ] && echo "✅ ammocoind found" || (echo "❌ ammocoind missing" && exit 1)
          [ -f dist/bin/ammocoin-cli ] && echo "✅ ammocoin-cli found" || (echo "❌ ammocoin-cli missing" && exit 1)
          [ -f dist/bin/ammocoin-tx ] && echo "✅ ammocoin-tx found" || (echo "❌ ammocoin-tx missing" && exit 1)

          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if strings dist/bin/ammocoind | grep -q "$GENESIS_HASH"; then
            echo "✅ Genesis hash verified in binary"
          else
            echo "❌ Genesis hash NOT found!"
            exit 1
          fi

          echo "📋 Binary info:"
          file dist/bin/ammocoind dist/bin/ammocoin-cli dist/bin/ammocoin-tx
          echo "📊 Binary sizes:"
          ls -lh dist/bin/ammocoind dist/bin/ammocoin-cli dist/bin/ammocoin-tx

      - name: Create Release Package
        run: |
          echo "📦 Creating Linux release package..."
          mkdir -p release-package/bin
          cp source/dist/bin/ammocoind release-package/bin/
          cp source/dist/bin/ammocoin-cli release-package/bin/
          cp source/dist/bin/ammocoin-tx release-package/bin/
          cd release-package
          tar -czf ../AMMOcoin-v1.1.0-Linux-x86_64.tar.gz bin/
          cd ..
          zip -r AMMOcoin-v1.1.0-Linux-x86_64.zip release-package/bin/
          echo "✅ Release packages created"

      - name: Generate checksums
        run: |
          echo "🔐 Generating SHA256 checksums..."
          sha256sum AMMOcoin-v1.1.0-Linux-x86_64.tar.gz > AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          sha256sum AMMOcoin-v1.1.0-Linux-x86_64.zip >> AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          cat AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AMMOcoin-v1.1.0-Linux-x86_64
          path: |
            AMMOcoin-v1.1.0-Linux-x86_64.tar.gz
            AMMOcoin-v1.1.0-Linux-x86_64.zip
            AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt

      - name: Upload Individual Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Binaries
          path: |
            source/dist/bin/ammocoind
            source/dist/bin/ammocoin-cli
            source/dist/bin/ammocoin-tx
