name: Build AMMOcoin v1.1.0 Linux x86_64

on:
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    name: Build Linux x86_64 Static Binaries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            git \
            curl \
            wget \
            python3 \
            bsdmainutils \
            cmake \
            qtbase5-dev \
            qttools5-dev \
            qttools5-dev-tools \
            libqt5svg5-dev \
            libqt5charts5-dev \
            libqrencode-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libxcb1-dev \
            libx11-xcb-dev \
            libxcb-xkb-dev \
            libxcb-cursor-dev \
            libxcb-xfixes0-dev \
            libxcb-shm0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrender-dev

      - name: Install Rust for librustzcash
        run: |
          echo "🦀 Installing Rust 1.80+ and setting as default..."
          rustup toolchain install 1.80
          rustup default 1.80
          rustc --version
          cargo --version
          echo "✅ Rust 1.80 set as default"

      - name: Vendor Rust dependencies
        working-directory: source
        run: |
          echo "📦 Vendoring Rust dependencies..."
          cargo vendor vendor-sources
          echo "✅ Rust dependencies vendored"
          du -sh vendor-sources

      - name: Verify Genesis Block Hash
        run: |
          echo "🔍 Verifying v1.1.0 genesis block in source code..."
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if grep -q "$GENESIS_HASH" source/src/chainparams.cpp; then
            echo "✅ Correct genesis hash found: $GENESIS_HASH"
          else
            echo "❌ ERROR: Expected genesis hash not found!"
            exit 1
          fi

      - name: Verify Boost fix
        run: |
          echo "🔍 Verifying Boost PTHREAD_STACK_MIN fix..."
          if grep -q "PTHREAD_STACK_MIN=16384" source/depends/packages/boost.mk; then
            echo "✅ Boost fix found: PTHREAD_STACK_MIN defined as compile-time constant"
          else
            echo "❌ ERROR: Boost fix not found!"
            exit 1
          fi

      - name: Build dependencies (Boost, BDB, libevent, etc.) - STATIC
        working-directory: source/depends
        run: |
          echo "🔨 Building dependencies for Linux with STATIC linking..."
          echo "Building on Ubuntu 22.04 with Boost PTHREAD_STACK_MIN fix"
          echo "Building: Boost, OpenSSL, BerkeleyDB, libevent, ZMQ, GMP, libsodium"

          # Depends build needs real autotools, so don't override them here
          # NO_QT=1: Use system Qt packages instead of depends Qt
          # (depends Qt requires building libxcb/X11 from source which is complex)
          make -j$(nproc) HOST=x86_64-pc-linux-gnu NO_QT=1

          echo "✅ Dependencies built successfully"

          echo "📦 Copying vendored Rust sources to depends directory..."
          mkdir -p x86_64-pc-linux-gnu/vendored-sources
          cp -r ../vendor-sources/* x86_64-pc-linux-gnu/vendored-sources/
          echo "✅ Vendored sources copied"

      - name: Build AMMOcoin Linux Binaries
        working-directory: source
        # Disable autotools regeneration ONLY for main source build
        env:
          ACLOCAL: ":"
          AUTOCONF: ":"
          AUTOMAKE: ":"
          AUTOHEADER: ":"
        run: |
          echo "🔨 Starting Linux build..."

          echo "🧹 Cleaning stale Qt generated files (moc/ui/qrc)..."
          rm -f src/qt/moc_*.cpp src/qt/ammocoin/moc_*.cpp src/qt/ammocoin/settings/moc_*.cpp
          rm -f src/qt/forms/ui_*.h src/qt/ammocoin/forms/ui_*.h src/qt/ammocoin/settings/forms/ui_*.h
          rm -f src/qt/qrc_*.cpp src/qt/*.moc src/qt/locale/*.qm
          echo "✅ Stale Qt files cleaned"

          echo "🔧 Configuring for Linux x86_64 with static dependencies and vendored Rust..."
          CONFIG_SITE=$PWD/depends/x86_64-pc-linux-gnu/share/config.site \
          ./configure \
            --prefix=$PWD/dist \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-maintainer-mode \
            --disable-online-rust \
            CXXFLAGS="-DPTHREAD_STACK_MIN=16384" \
            CPPFLAGS="-DPTHREAD_STACK_MIN=16384" \
            LDFLAGS="-static-libstdc++ -static-libgcc" \
            RUSTC="$(command -v rustc)" \
            CARGO="$(command -v cargo)"

          echo "✅ Starting build with Rust 1.80..."
          echo "Using rustc: $(which rustc)"
          echo "Rust version: $(rustc --version)"
          make -j$(nproc)
          echo "✅ Build completed successfully"

          echo "📦 Installing binaries..."
          make install
          echo "✅ Installation complete"

      - name: Strip binaries
        working-directory: source
        run: |
          echo "✂️  Stripping debug symbols..."
          strip dist/bin/ammocoind
          strip dist/bin/ammocoin-cli
          strip dist/bin/ammocoin-tx
          if [ -f dist/bin/ammocoin-qt ]; then
            strip dist/bin/ammocoin-qt
          fi
          echo "📊 Final binary sizes:"
          ls -lh dist/bin/

      - name: Verify static linking
        working-directory: source
        run: |
          echo "🔍 Verifying binary dependencies..."
          echo "=== ammocoind dependencies ==="
          ldd dist/bin/ammocoind
          echo ""

          # Check for Boost dynamic libraries (should NOT be present)
          if ldd dist/bin/ammocoind | grep -i "boost"; then
            echo "❌ ERROR: Binary still has dynamic Boost dependencies!"
            exit 1
          else
            echo "✅ No Boost dynamic dependencies - GOOD!"
          fi

          # Verify no "not found" dependencies
          if ldd dist/bin/ammocoind | grep "not found"; then
            echo "❌ ERROR: Binary has missing dependencies!"
            exit 1
          else
            echo "✅ All dependencies resolved - GOOD!"
          fi

          echo "🎉 Binary verification complete!"

      - name: Verify Compiled Binaries
        working-directory: source
        run: |
          echo "🔍 Verifying compiled binaries..."
          [ -f dist/bin/ammocoind ] && echo "✅ ammocoind found" || (echo "❌ ammocoind missing" && exit 1)
          [ -f dist/bin/ammocoin-cli ] && echo "✅ ammocoin-cli found" || (echo "❌ ammocoin-cli missing" && exit 1)
          [ -f dist/bin/ammocoin-tx ] && echo "✅ ammocoin-tx found" || (echo "❌ ammocoin-tx missing" && exit 1)
          [ -f dist/bin/ammocoin-qt ] && echo "✅ ammocoin-qt found" || echo "⚠️  ammocoin-qt not found (Qt build may have been skipped)"

          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if strings dist/bin/ammocoind | grep -q "$GENESIS_HASH"; then
            echo "✅ Genesis hash verified in binary"
          else
            echo "❌ Genesis hash NOT found!"
            exit 1
          fi

          echo "📋 Binary info:"
          file dist/bin/ammocoind dist/bin/ammocoin-cli dist/bin/ammocoin-tx dist/bin/ammocoin-qt 2>/dev/null || true
          echo "📊 Binary sizes:"
          ls -lh dist/bin/ 2>/dev/null || true

      - name: Create Release Package
        run: |
          echo "📦 Creating Linux release package..."
          mkdir -p release-package/bin
          cp source/dist/bin/ammocoind release-package/bin/
          cp source/dist/bin/ammocoin-cli release-package/bin/
          cp source/dist/bin/ammocoin-tx release-package/bin/
          cp source/dist/bin/ammocoin-qt release-package/bin/ 2>/dev/null || true
          cd release-package
          tar -czf ../AMMOcoin-v1.1.0-Linux-x86_64.tar.gz bin/
          cd ..
          zip -r AMMOcoin-v1.1.0-Linux-x86_64.zip release-package/bin/
          echo "✅ Release packages created"

      - name: Build Debian Package
        run: |
          echo "📦 Building .deb package (amd64)..."
          DEB_ROOT="deb-staging/ammocoin_1.1.0-1_amd64"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/bin"
          mkdir -p "$DEB_ROOT/etc/ammocoin"
          mkdir -p "$DEB_ROOT/lib/systemd/system"

          # Copy binaries
          cp source/dist/bin/ammocoind "$DEB_ROOT/usr/bin/"
          cp source/dist/bin/ammocoin-cli "$DEB_ROOT/usr/bin/"
          cp source/dist/bin/ammocoin-tx "$DEB_ROOT/usr/bin/"

          # Copy systemd service
          cp source/contrib/debian/ammocoind.service "$DEB_ROOT/lib/systemd/system/"

          # Copy example config
          cp source/contrib/debian/examples/ammocoin.conf "$DEB_ROOT/etc/ammocoin/"

          # Copy maintainer scripts
          cp source/contrib/debian/ammocoind.postinst "$DEB_ROOT/DEBIAN/postinst"
          cp source/contrib/debian/ammocoind.postrm "$DEB_ROOT/DEBIAN/postrm"
          chmod 755 "$DEB_ROOT/DEBIAN/postinst" "$DEB_ROOT/DEBIAN/postrm"

          # Calculate installed size
          INSTALLED_SIZE=$(du -sk "$DEB_ROOT" | cut -f1)

          # Create control file
          cat > "$DEB_ROOT/DEBIAN/control" << EOF
          Package: ammocoin
          Version: 1.1.0-1
          Architecture: amd64
          Maintainer: AMMOcoin Core <dev@ammocoin.org>
          Depends: libc6 (>= 2.31)
          Section: net
          Priority: optional
          Homepage: https://www.ammocoin.org
          Installed-Size: ${INSTALLED_SIZE}
          Description: AMMOcoin daemon and CLI tools
           AMMOcoin is a cryptocurrency focused on community and mining.
           This package provides the headless daemon (ammocoind),
           command-line interface (ammocoin-cli), and transaction
           utility (ammocoin-tx) with systemd service integration.
          EOF

          # Remove leading spaces from control file (heredoc indentation)
          sed -i 's/^          //' "$DEB_ROOT/DEBIAN/control"

          # Build the deb
          dpkg-deb --build "$DEB_ROOT"
          mv "deb-staging/ammocoin_1.1.0-1_amd64.deb" "AMMOcoin-v1.1.0-Linux-amd64.deb"
          echo "✅ .deb package created"
          ls -lh AMMOcoin-v1.1.0-Linux-amd64.deb
          dpkg -c AMMOcoin-v1.1.0-Linux-amd64.deb

      - name: Generate checksums
        run: |
          echo "🔐 Generating SHA256 checksums..."
          sha256sum AMMOcoin-v1.1.0-Linux-x86_64.tar.gz > AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          sha256sum AMMOcoin-v1.1.0-Linux-x86_64.zip >> AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          sha256sum AMMOcoin-v1.1.0-Linux-amd64.deb >> AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          cat AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AMMOcoin-v1.1.0-Linux-x86_64
          path: |
            AMMOcoin-v1.1.0-Linux-x86_64.tar.gz
            AMMOcoin-v1.1.0-Linux-x86_64.zip
            AMMOcoin-v1.1.0-Linux-amd64.deb
            AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt

      - name: Upload Individual Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Binaries
          path: |
            source/dist/bin/ammocoind
            source/dist/bin/ammocoin-cli
            source/dist/bin/ammocoin-tx
            source/dist/bin/ammocoin-qt
