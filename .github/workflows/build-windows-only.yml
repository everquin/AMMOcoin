name: Build AMMOcoin v1.1.0 Windows Only

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ammocoin-apps-from-ammocoin/**'
      - '.github/workflows/**'

jobs:
  build-windows-x86_64:
    runs-on: ubuntu-22.04
    name: Build Windows x86_64 Binaries
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Windows cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            git \
            curl \
            wget \
            python3 \
            mingw-w64 \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            libgmp-dev \
            libsodium-dev \
            nsis

      - name: Configure MinGW to use POSIX threads
        run: |
          echo "🔧 Configuring MinGW-w64 to use POSIX threading model..."
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          echo "✅ MinGW configured for POSIX threads (enables std::mutex, std::thread)"

      - name: Install Rust with Windows target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu
          override: true

      - name: Verify Genesis Block Hash
        run: |
          echo "🔍 Verifying v1.1.0 genesis block in source code..."
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          MERKLE_ROOT="a4b9dffe1a0e162f632ee851de1414adb433ab2303619c54fb859caa315042ab"
          NONCE="1299391"
          if grep -q "$GENESIS_HASH" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct genesis hash found: $GENESIS_HASH"
          else
            echo "❌ ERROR: Expected genesis hash not found!"
            exit 1
          fi

      - name: Update timestamps on pre-generated files
        run: |
          echo "🔧 Updating timestamps on pre-generated autotools files..."
          find ammocoin-apps-from-ammocoin -name "configure" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "Makefile.in" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "aclocal.m4" -exec touch {} \;
          echo "✅ Timestamps updated"

      - name: Build Windows dependencies with Qt patch
        working-directory: ammocoin-apps-from-ammocoin/depends
        run: |
          echo "🔨 Building dependencies for Windows (this takes 15-20 minutes)..."
          echo "Building: Boost, OpenSSL, BerkeleyDB, libevent, ZMQ, GMP, libsodium, Qt..."
          
          # Start the build
          make -j$(nproc) HOST=x86_64-w64-mingw32 &
          BUILD_PID=$!
          
          # Monitor for Qt extraction and apply patch
          echo "📡 Monitoring for Qt extraction to apply numeric_limits patch..."
          while kill -0 $BUILD_PID 2>/dev/null; do
            QT_HEADER="work/build/x86_64-w64-mingw32/qt/*/qtbase/src/corelib/tools/qbytearraymatcher.h"
            if ls $QT_HEADER 2>/dev/null; then
              echo "✅ Qt extracted, applying #include <limits> patch..."
              for file in $QT_HEADER; do
                if ! grep -q "#include <limits>" "$file"; then
                  sed -i '/#include <QtCore\/qbytearray.h>/a \\n#include <limits>' "$file"
                  echo "✅ Patched: $file"
                fi
              done
              break
            fi
            sleep 5
          done
          
          # Wait for build to complete
          wait $BUILD_PID
          BUILD_RESULT=$?
          
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "❌ Build failed with exit code $BUILD_RESULT"
            exit $BUILD_RESULT
          fi
          
          echo "✅ Dependencies built successfully"

      - name: Build AMMOcoin Windows Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔨 Starting Windows cross-compilation..."
          chmod +x configure
          chmod +x src/univalue/configure
          chmod +x src/secp256k1/configure
          chmod +x src/chiabls/configure
          
          echo "🔧 Configuring for Windows x86_64..."
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-maintainer-mode
          
          echo "🔧 Touching Makefiles to prevent regeneration..."
          find . -name "Makefile" -exec touch {} \;
          find . -name "Makefile.in" -exec touch {} \;
          sleep 1
          touch src/univalue/Makefile src/secp256k1/Makefile
          
          echo "✅ Starting build..."
          make -j$(nproc)
          echo "✅ Build completed successfully"

      - name: Verify Compiled Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔍 Verifying compiled binaries..."
          [ -f src/ammocoind.exe ] && echo "✅ ammocoind.exe found" || (echo "❌ ammocoind.exe missing" && exit 1)
          [ -f src/ammocoin-cli.exe ] && echo "✅ ammocoin-cli.exe found" || (echo "❌ ammocoin-cli.exe missing" && exit 1)
          [ -f src/ammocoin-tx.exe ] && echo "✅ ammocoin-tx.exe found" || (echo "❌ ammocoin-tx.exe missing" && exit 1)
          
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if strings src/ammocoind.exe | grep -q "$GENESIS_HASH"; then
            echo "✅ Genesis hash verified in binary"
          else
            echo "❌ Genesis hash NOT found!"
            exit 1
          fi
          
          echo "📋 Binary info:"
          file src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe
          echo "📊 Binary sizes:"
          ls -lh src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe

      - name: Create Release Package
        run: |
          echo "📦 Creating Windows release package..."
          mkdir -p release-package/bin
          cp ammocoin-apps-from-ammocoin/src/ammocoind.exe release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-cli.exe release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-tx.exe release-package/bin/
          cd release-package
          tar -czf ../AMMOcoin-v1.1.0-Windows-x86_64.tar.gz bin/
          cd ..
          zip -r AMMOcoin-v1.1.0-Windows-x86_64.zip release-package/bin/
          echo "✅ Release packages created"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AMMOcoin-v1.1.0-Windows-x86_64
          path: |
            AMMOcoin-v1.1.0-Windows-x86_64.tar.gz
            AMMOcoin-v1.1.0-Windows-x86_64.zip

      - name: Upload Individual Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Binaries
          path: |
            ammocoin-apps-from-ammocoin/src/ammocoind.exe
            ammocoin-apps-from-ammocoin/src/ammocoin-cli.exe
            ammocoin-apps-from-ammocoin/src/ammocoin-tx.exe
