name: Build AMMOcoin v1.1.0 Release Binaries

on:
  push:
    branches:
      - main
    paths:
      - 'ammocoin-apps-from-ammocoin/src/**'
      - 'ammocoin-source/src/**'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64 Binaries
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            git \
            curl \
            wget \
            libssl-dev \
            libboost-all-dev \
            libdb-dev \
            libdb++-dev \
            libevent-dev \
            libzmq3-dev \
            libminiupnpc-dev \
            libnatpmp-dev \
            libgmp-dev \
            libsodium-dev \
            python3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Update timestamps on pre-generated files
        run: |
          echo "🔧 Updating timestamps on pre-generated autotools files..."
          find ammocoin-apps-from-ammocoin -name "configure" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "Makefile.in" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "aclocal.m4" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "config.h.in" -exec touch {} \;
          echo "✅ Timestamps updated"

      - name: Verify Genesis Block Hash
        run: |
          echo "🔍 Verifying v1.1.0 genesis block in source code..."
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          MERKLE_ROOT="a4b9dffe1a0e162f632ee851de1414adb433ab2303619c54fb859caa315042ab"
          NONCE="1299391"
          if grep -q "$GENESIS_HASH" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct genesis hash found: $GENESIS_HASH"
          else
            echo "❌ ERROR: Expected genesis hash not found!"
            echo "Expected: $GENESIS_HASH"
            exit 1
          fi
          if grep -q "$MERKLE_ROOT" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct merkle root found: $MERKLE_ROOT"
          else
            echo "❌ ERROR: Expected merkle root not found!"
            exit 1
          fi
          if grep -q "$NONCE" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct nNonce found: $NONCE"
          else
            echo "❌ ERROR: Expected nNonce not found!"
            exit 1
          fi

      - name: Build AMMOcoin Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔨 Starting build process..."
          echo "✅ Using pre-generated configure scripts (skipping autogen.sh)"
          chmod +x configure
          chmod +x src/univalue/configure
          chmod +x src/secp256k1/configure
          chmod +x src/chiabls/configure
          echo "🔧 Configuring main project..."
          ./configure \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-maintainer-mode \
            CXXFLAGS="-O2 -g" \
            LDFLAGS="-static-libgcc -static-libstdc++"
          echo "🔧 Touching generated Makefiles to prevent regeneration..."
          find . -name "Makefile" -exec touch {} \;
          find . -name "Makefile.in" -exec touch {} \;
          sleep 1
          touch src/univalue/Makefile src/univalue/Makefile.in
          touch src/secp256k1/Makefile src/secp256k1/Makefile.in
          echo "✅ Configuration complete, starting build..."
          make -j$(nproc)
          echo "✅ Build completed successfully"

      - name: Verify Compiled Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔍 Verifying compiled binaries..."
          if [ ! -f src/ammocoind ]; then
            echo "❌ ammocoind not found!"
            exit 1
          fi
          if [ ! -f src/ammocoin-cli ]; then
            echo "❌ ammocoin-cli not found!"
            exit 1
          fi
          if [ ! -f src/ammocoin-tx ]; then
            echo "❌ ammocoin-tx not found!"
            exit 1
          fi
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if strings src/ammocoind | grep -q "$GENESIS_HASH"; then
            echo "✅ Genesis hash verified in ammocoind binary"
          else
            echo "❌ Genesis hash NOT found in binary!"
            exit 1
          fi
          echo "📋 Binary version:"
          src/ammocoind --version || true
          echo "📊 Binary sizes:"
          ls -lh src/ammocoind src/ammocoin-cli src/ammocoin-tx

      - name: Create Release Package
        run: |
          echo "📦 Creating release package..."
          mkdir -p release-package/bin
          cp ammocoin-apps-from-ammocoin/src/ammocoind release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-cli release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-tx release-package/bin/
          chmod +x release-package/bin/*
          cat > release-package/README.md << 'EOFREADME'
          # AMMOcoin v1.1.0 - Linux x86_64

          **Built:** $(date -u)
          **Platform:** Linux x86_64 (Ubuntu 22.04+)
          **Build:** GitHub Actions (Automated)

          ## ✅ Verified Genesis Block

          ```
          Genesis Hash:   000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2
          Merkle Root:    a4b9dffe1a0e162f632ee851de1414adb433ab2303619c54fb859caa315042ab
          Genesis Time:   1623089845 (June 7, 2021)
          Genesis Nonce:  1299391
          Genesis Reward: 250,000,000 AMMO
          ```

          ## Package Contents

          - `ammocoind` - AMMOcoin daemon
          - `ammocoin-cli` - Command-line interface
          - `ammocoin-tx` - Transaction utility

          ## Installation

          ```bash
          sudo cp bin/* /usr/local/bin/
          sudo chmod +x /usr/local/bin/ammocoin*
          ```

          ## Quick Start

          ```bash
          # Start daemon
          ammocoind -daemon

          # Check status
          ammocoin-cli getinfo

          # Get genesis block
          ammocoin-cli getblockhash 0
          # Should return: 000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2

          # Stop daemon
          ammocoin-cli stop
          ```

          ## Network Parameters

          - Max Supply: 9,999,999,999 AMMO
          - Genesis Premine: 250,000,000 AMMO
          - Block Time: 3 minutes
          - RPC Port: 37020
          - P2P Port: 37019
          - Masternode Collateral: 10,000 AMMO

          Built with ❤️ by GitHub Actions
          EOFREADME
          cd release-package
          tar -czf ../AMMOcoin-v1.1.0-Linux-x86_64.tar.gz .
          cd ..
          sha256sum AMMOcoin-v1.1.0-Linux-x86_64.tar.gz > AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          echo "✅ Release package created"
          echo "📦 Package size:"
          ls -lh AMMOcoin-v1.1.0-Linux-x86_64.tar.gz
          echo ""
          echo "🔐 SHA256 Checksum:"
          cat AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ammocoin-linux-x86_64
          path: |
            AMMOcoin-v1.1.0-Linux-x86_64.tar.gz
            AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          retention-days: 90

      - name: Upload Individual Binaries (for verification)
        uses: actions/upload-artifact@v4
        with:
          name: ammocoin-linux-binaries-raw
          path: |
            ammocoin-apps-from-ammocoin/src/ammocoind
            ammocoin-apps-from-ammocoin/src/ammocoin-cli
            ammocoin-apps-from-ammocoin/src/ammocoin-tx
          retention-days: 30

  build-windows-x86_64:
    name: Build Windows x86_64 Binaries
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Windows cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            git \
            curl \
            wget \
            python3 \
            mingw-w64 \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            libgmp-dev \
            libsodium-dev \
            nsis

      - name: Install Rust with Windows target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu
          override: true

      - name: Verify Genesis Block Hash
        run: |
          echo "🔍 Verifying v1.1.0 genesis block in source code..."
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          MERKLE_ROOT="a4b9dffe1a0e162f632ee851de1414adb433ab2303619c54fb859caa315042ab"
          NONCE="1299391"
          if grep -q "$GENESIS_HASH" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct genesis hash found: $GENESIS_HASH"
          else
            echo "❌ ERROR: Expected genesis hash not found!"
            echo "Expected: $GENESIS_HASH"
            exit 1
          fi
          if grep -q "$MERKLE_ROOT" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct merkle root found: $MERKLE_ROOT"
          else
            echo "❌ ERROR: Expected merkle root not found!"
            exit 1
          fi
          if grep -q "$NONCE" ammocoin-apps-from-ammocoin/src/chainparams.cpp; then
            echo "✅ Correct nNonce found: $NONCE"
          else
            echo "❌ ERROR: Expected nNonce not found!"
            exit 1
          fi

      - name: Update timestamps on pre-generated files
        run: |
          echo "🔧 Updating timestamps on pre-generated autotools files..."
          find ammocoin-apps-from-ammocoin -name "configure" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "Makefile.in" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "aclocal.m4" -exec touch {} \;
          find ammocoin-apps-from-ammocoin -name "config.h.in" -exec touch {} \;
          echo "✅ Timestamps updated"

      - name: Build Windows dependencies
        working-directory: ammocoin-apps-from-ammocoin/depends
        run: |
          echo "🔨 Building dependencies for Windows..."
          make -j$(nproc) HOST=x86_64-w64-mingw32
          echo "✅ Dependencies built successfully"

      - name: Build AMMOcoin Windows Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔨 Starting Windows cross-compilation..."
          echo "✅ Using pre-generated configure scripts (skipping autogen.sh)"
          chmod +x configure
          chmod +x src/univalue/configure
          chmod +x src/secp256k1/configure
          chmod +x src/chiabls/configure
          echo "🔧 Configuring for Windows x86_64..."
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-maintainer-mode
          echo "🔧 Touching generated Makefiles to prevent regeneration..."
          find . -name "Makefile" -exec touch {} \;
          find . -name "Makefile.in" -exec touch {} \;
          sleep 1
          touch src/univalue/Makefile src/univalue/Makefile.in
          touch src/secp256k1/Makefile src/secp256k1/Makefile.in
          echo "✅ Configuration complete, starting build..."
          make -j$(nproc)
          echo "✅ Build completed successfully"

      - name: Verify Compiled Binaries
        working-directory: ammocoin-apps-from-ammocoin
        run: |
          echo "🔍 Verifying compiled binaries..."
          if [ ! -f src/ammocoind.exe ]; then
            echo "❌ ammocoind.exe not found!"
            exit 1
          fi
          if [ ! -f src/ammocoin-cli.exe ]; then
            echo "❌ ammocoin-cli.exe not found!"
            exit 1
          fi
          if [ ! -f src/ammocoin-tx.exe ]; then
            echo "❌ ammocoin-tx.exe not found!"
            exit 1
          fi
          GENESIS_HASH="000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2"
          if strings src/ammocoind.exe | grep -q "$GENESIS_HASH"; then
            echo "✅ Genesis hash verified in ammocoind.exe binary"
          else
            echo "❌ Genesis hash NOT found in binary!"
            exit 1
          fi
          echo "📋 Binary info:"
          file src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe
          echo "📊 Binary sizes:"
          ls -lh src/ammocoind.exe src/ammocoin-cli.exe src/ammocoin-tx.exe

      - name: Create Release Package
        run: |
          echo "📦 Creating Windows release package..."
          mkdir -p release-package/bin
          cp ammocoin-apps-from-ammocoin/src/ammocoind.exe release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-cli.exe release-package/bin/
          cp ammocoin-apps-from-ammocoin/src/ammocoin-tx.exe release-package/bin/
          chmod +x release-package/bin/*
          cat > release-package/README.md << 'EOFREADME'
          # AMMOcoin v1.1.0 - Windows x86_64

          **Built:** $(date -u)
          **Platform:** Windows x86_64 (Windows 10+)
          **Build:** GitHub Actions (Cross-compiled from Ubuntu)

          ## ✅ Verified Genesis Block

          ```
          Genesis Hash:   000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2
          Merkle Root:    a4b9dffe1a0e162f632ee851de1414adb433ab2303619c54fb859caa315042ab
          Genesis Time:   1623089845 (June 7, 2021)
          Genesis Nonce:  1299391
          Genesis Reward: 250,000,000 AMMO
          ```

          ## Package Contents

          - `ammocoind.exe` - AMMOcoin daemon
          - `ammocoin-cli.exe` - Command-line interface
          - `ammocoin-tx.exe` - Transaction utility

          ## Installation

          1. Extract all files to a folder (e.g., `C:\AMMOcoin\`)
          2. Open Command Prompt or PowerShell in that folder

          ## Quick Start

          ```cmd
          # Start daemon
          ammocoind.exe -daemon

          # Check status
          ammocoin-cli.exe getinfo

          # Get genesis block
          ammocoin-cli.exe getblockhash 0
          # Should return: 000000593410213331b5adcc6a79054a984bfc9999825e579171f81f2eccddd2

          # Stop daemon
          ammocoin-cli.exe stop
          ```

          ## Network Parameters

          - Max Supply: 9,999,999,999 AMMO
          - Genesis Premine: 250,000,000 AMMO
          - Block Time: 3 minutes
          - RPC Port: 37020
          - P2P Port: 37019
          - Masternode Collateral: 10,000 AMMO

          Built with ❤️ by GitHub Actions
          EOFREADME
          cd release-package
          zip -r ../AMMOcoin-v1.1.0-Windows-x86_64.zip .
          cd ..
          sha256sum AMMOcoin-v1.1.0-Windows-x86_64.zip > AMMOcoin-v1.1.0-Windows-x86_64-CHECKSUM.txt
          echo "✅ Release package created"
          echo "📦 Package size:"
          ls -lh AMMOcoin-v1.1.0-Windows-x86_64.zip
          echo ""
          echo "🔐 SHA256 Checksum:"
          cat AMMOcoin-v1.1.0-Windows-x86_64-CHECKSUM.txt

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ammocoin-windows-x86_64
          path: |
            AMMOcoin-v1.1.0-Windows-x86_64.zip
            AMMOcoin-v1.1.0-Windows-x86_64-CHECKSUM.txt
          retention-days: 90

      - name: Upload Individual Binaries (for verification)
        uses: actions/upload-artifact@v4
        with:
          name: ammocoin-windows-binaries-raw
          path: |
            ammocoin-apps-from-ammocoin/src/ammocoind.exe
            ammocoin-apps-from-ammocoin/src/ammocoin-cli.exe
            ammocoin-apps-from-ammocoin/src/ammocoin-tx.exe
          retention-days: 30

  build-summary:
    name: Build Summary
    needs: [build-linux-x86_64, build-windows-x86_64]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ammocoin-linux-x86_64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ammocoin-windows-x86_64

      - name: Display Build Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 AMMOcoin v1.1.0 Multi-Platform Build Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Linux x86_64 Package:"
          ls -lh AMMOcoin-v1.1.0-Linux-x86_64.tar.gz
          echo ""
          echo "🔐 Linux Checksum:"
          cat AMMOcoin-v1.1.0-Linux-x86_64-CHECKSUM.txt
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Windows x86_64 Package:"
          ls -lh AMMOcoin-v1.1.0-Windows-x86_64.zip
          echo ""
          echo "🔐 Windows Checksum:"
          cat AMMOcoin-v1.1.0-Windows-x86_64-CHECKSUM.txt
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Genesis Block: VERIFIED (both platforms)"
          echo "✅ Linux Binaries: COMPILED"
          echo "✅ Windows Binaries: CROSS-COMPILED"
          echo "✅ Release Packages: CREATED"
          echo ""
          echo "Download artifacts from the Actions tab above!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
